<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PrepaTrack - Sistema de seguimiento de progreso academico para estudiantes preuniversitarios UNMSM">
    <title>PrepaTrack - Seguimiento Academico UNMSM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Pantalla de Login / Registro -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-bg-pattern"></div>
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="logo-shield">
                        <span class="logo-letters">PT</span>
                    </div>
                    <h1 class="auth-title">PrepaTrack</h1>
                    <p class="auth-subtitle">Sistema de Seguimiento Academico</p>
                    <p class="auth-university">Universidad Nacional Mayor de San Marcos</p>
                </div>
            </div>
            <div class="auth-card">
                <div class="auth-tabs">
                    <button id="btn-tab-login" class="auth-tab active" onclick="AuthModule.showLogin()">Iniciar Sesion</button>
                    <button id="btn-tab-register" class="auth-tab" onclick="AuthModule.showRegister()">Registrarse</button>
                </div>
                <!-- Login Form -->
                <form id="login-form" class="auth-form" onsubmit="AuthModule.login(event)">
                    <div class="form-group">
                        <label for="login-correo">Correo electronico</label>
                        <input type="email" id="login-correo" placeholder="usuario@unmsm.edu.pe" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contrasena</label>
                        <input type="password" id="login-password" placeholder="Ingresa tu contrasena" required>
                    </div>
                    <button type="submit" id="btn-login" class="btn btn-primary btn-full">Iniciar Sesion</button>
                    <p id="login-error" class="form-error"></p>
                </form>
                <!-- Register Form -->
                <form id="register-form" class="auth-form hidden" onsubmit="AuthModule.register(event)">
                    <div class="form-group">
                        <label for="reg-nombre">Nombre completo</label>
                        <input type="text" id="reg-nombre" placeholder="Tu nombre completo" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-correo">Correo electronico</label>
                        <input type="email" id="reg-correo" placeholder="usuario@unmsm.edu.pe" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Contrasena</label>
                        <input type="password" id="reg-password" placeholder="Crea una contrasena" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="reg-carrera">Carrera (opcional)</label>
                        <input type="text" id="reg-carrera" placeholder="Ej: Ingenieria de Sistemas">
                    </div>
                    <button type="submit" id="btn-register" class="btn btn-primary btn-full">Crear cuenta</button>
                    <p id="register-error" class="form-error"></p>
                </form>
            </div>
        </div>
    </div>

    <!-- Aplicacion Principal -->
    <div id="app-screen" class="app-screen hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="logo-shield small">
                        <span class="logo-letters">PT</span>
                    </div>
                    <span class="sidebar-brand">PrepaTrack</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" id="nav-dashboard" class="nav-item active" onclick="App.navigate('dashboard')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Panel Principal</span>
                </a>
                <a href="#" id="nav-cursos" class="nav-item" onclick="App.navigate('cursos')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                    <span>Cursos y Temas</span>
                </a>
                <a href="#" id="nav-simulacros" class="nav-item" onclick="App.navigate('simulacros')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    <span>Simulacros</span>
                </a>
                <a href="#" id="nav-horarios" class="nav-item" onclick="App.navigate('horarios')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>Horarios</span>
                </a>
                <a href="#" id="nav-metas" class="nav-item" onclick="App.navigate('metas')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <span>Metas</span>
                </a>
                <a href="#" id="nav-sesiones" class="nav-item" onclick="App.navigate('sesiones')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    <span>Sesiones</span>
                </a>
                <a href="#" id="nav-documentos" class="nav-item" onclick="App.navigate('documentos')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                    <span>Documentos</span>
                </a>
                <a href="#" id="nav-flashcards" class="nav-item" onclick="App.navigate('flashcards')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
                    <span>Flashcards</span>
                </a>
                <a href="#" id="nav-reportes" class="nav-item" onclick="App.navigate('reportes')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    <span>Reportes</span>
                </a>
                <a href="#" id="nav-monitor" class="nav-item" onclick="App.navigate('monitor')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0018 0V5"/><path d="M3 12a9 3 0 0018 0"/></svg>
                    <span>Monitor BD</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div id="user-info" class="user-info">
                    <div class="user-avatar">
                        <span id="user-initial">U</span>
                    </div>
                    <div class="user-details">
                        <span id="user-name" class="user-name">Usuario</span>
                        <span id="user-career" class="user-career">Carrera</span>
                    </div>
                </div>
                <button id="btn-logout" class="btn-logout" onclick="AuthModule.logout()">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span>Cerrar Sesion</span>
                </button>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main id="main-content" class="main-content">
            <div id="page-content" class="page-content">
                <!-- El contenido dinamico se renderiza aqui -->
            </div>
        </main>
    </div>

    <!-- Modal generico -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="App.closeModal(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Titulo</h2>
                <button id="btn-close-modal" class="modal-close" onclick="App.closeModal()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Contenido del modal -->
            </div>
        </div>
    </div>

    <!-- Toast de notificaciones -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/cursos.js"></script>
    <script src="js/simulacros.js"></script>
    <script src="js/horarios.js"></script>
    <script src="js/metas.js"></script>
    <script src="js/sesiones.js"></script>
    <script src="js/documentos.js"></script>
    <script src="js/flashcards.js"></script>
    <script src="js/reportes.js"></script>
    <script src="js/monitor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
